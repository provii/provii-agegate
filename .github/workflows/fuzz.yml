# Fuzz / Property-Based Testing , provii-agegate
# Runs fast-check property tests with extended iteration counts to
# surface edge cases in input parsing and state machine logic.

name: Fuzz Testing

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fast-check Property Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run property-based tests (extended iterations)
        # npm run test:property invokes jest --runInBand --testPathPattern,
        # but Jest 30 renamed --testPathPattern to --testPathPatterns.
        # Call jest directly with the correct flag.
        run: npx jest --runInBand --testPathPatterns='property.spec.ts' --verbose
        env:
          FAST_CHECK_NUM_RUNS: '10000'

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-failures
          path: |
            tests/property/**/*.log
            jest-*.xml
          retention-days: 30
          if-no-files-found: ignore
